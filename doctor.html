<!DOCTYPE html>
<html>
<head>
    <title>Add Doctor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <h2>Add Doctor</h2>
    <input type="text" id="name" placeholder="Doctor Name">
    <input type="text" id="specialization" placeholder="Specialization">
    <input type="email" id="email" placeholder="Email">
    <button onclick="addDoctor()">Add Doctor</button>
    
    <br><br>
    <a href="/"><button style="background-color: gray;">Back Home</button></a>
</div>

<script>
async function addDoctor(){
    const data = {
        Doctor_name: document.getElementById("name").value,
        Specialization: document.getElementById("specialization").value,
        email: document.getElementById("email").value
    }
    const response = await fetch("http://127.0.0.1:8000/add_Doctor",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(data)
    })
    const result = await response.json()
    alert(result.message)
}
</script>
</body>
</html>
